<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Real Estate"/>
  <meta name="theme-color" content="#F5F2ED"/>
  <title>Real Estate — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="apple-touch-icon" href="mgmt-apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="mgmt-favicon-32.png"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>

  <style>
    :root {
      --cream:   #F5F2ED;
      --warm:    #EDE8E0;
      --rule:    #E0DAD0;
      --stone:   #C8BFB0;
      --taupe:   #9A8E7E;
      --body:    #3A3530;
      --ink:     #1E1B18;
      --gold:    #B8956A;
      --gold-lt: #F0E8DA;
      --gold-dk: #9A7040;
      --error:   #C0574A;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--body);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .root {
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(32px + var(--safe-top)) 24px calc(40px + var(--safe-bottom));
    }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 40px;
      letter-spacing: 0.03em;
      color: var(--ink);
      text-align: center;
      line-height: 1;
      margin-bottom: 7px;
    }
    .studio-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--taupe);
      text-align: center;
      margin-bottom: 3px;
    }
    .access-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--stone);
      text-align: center;
      margin-bottom: 36px;
    }

    .login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
    }

    /* ── APP BUTTONS ── */
    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .role-tab {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 14px 12px;
      background: #fff;
      border: 0.5px solid var(--rule);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .role-tab:hover { border-color: var(--stone); background: var(--warm); }
    .role-tab:active { transform: scale(.96); }

    .role-tab i {
      font-size: 17px;
      color: var(--stone);
      transition: color .15s;
      flex-shrink: 0;
    }
    .role-tab span {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--stone);
      transition: color .15s;
      white-space: nowrap;
    }

    /* Selected state */
    .role-tab.active {
      background: var(--gold-lt);
      border: 1.5px solid var(--gold);
    }
    .role-tab.active i { color: var(--gold-dk); }
    .role-tab.active span { color: var(--gold-dk); }

    /* ── PASSWORD ── */
    .cc-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: #fff;
      border: 0.5px solid var(--stone);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 300;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .cc-input::placeholder { color: var(--stone); }
    .cc-input:focus { border-color: var(--gold); }
    .cc-input.error { border-color: var(--error); }

    .login-error {
      font-size: 11px;
      color: var(--error);
      display: none;
      margin-top: 6px;
      padding-left: 1px;
    }
    .login-error.visible { display: block; }

    /* ── ENTER ── */
    .enter-btn {
      width: 100%;
      height: 46px;
      margin-top: 10px;
      background: var(--warm);
      border: 0.5px solid var(--stone);
      border-radius: 6px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--body);
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .enter-btn:hover  { background: var(--rule); border-color: var(--taupe); }
    .enter-btn:active { transform: scale(.99); }

    @media (min-width: 600px) {
      .wordmark { font-size: 46px; }
      .login-form { max-width: 340px; }
    }
  </style>
</head>
<body>

<div class="root">

  <p class="wordmark">Real Estate</p>
  <p class="studio-label">Management</p>
  <p class="access-label">Private access</p>

  <div class="login-form">

    <div class="role-tabs" role="group" aria-label="Select app">
      <button class="role-tab" data-dest="properties.html">
        <i class="ti ti-building-estate" aria-hidden="true"></i>
        <span>Properties</span>
      </button>
      <button class="role-tab" data-dest="landlord.html">
        <i class="ti ti-key" aria-hidden="true"></i>
        <span>Rentals</span>
      </button>
      <button class="role-tab active" data-dest="landlord.html" data-tab="rooms">
        <i class="ti ti-home-heart" aria-hidden="true"></i>
        <span>Casa Castel</span>
      </button>
      <button class="role-tab" data-dest="controlling.html">
        <i class="ti ti-chart-bar" aria-hidden="true"></i>
        <span>Controlling</span>
      </button>
    </div>

    <input class="cc-input" id="loginPass" type="password" placeholder="Password" autocomplete="current-password"/>
    <div class="login-error" id="loginError">Incorrect password.</div>

    <button class="enter-btn" id="enterBtn">Enter</button>

  </div>

</div>

<script>
  const PASS     = 'casacastel2025';
  const SESS_KEY = 'studio_authed';

  const loginPass  = document.getElementById('loginPass');
  const loginError = document.getElementById('loginError');
  const enterBtn   = document.getElementById('enterBtn');
  const tabs       = document.querySelectorAll('.role-tab');

  let selectedDest = 'landlord.html';
  let selectedTab  = 'rooms';

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectedDest = tab.dataset.dest;
      selectedTab  = tab.dataset.tab || null;
      clearError();
    });
  });

  function isAuthed() {
    return sessionStorage.getItem(SESS_KEY) === '1'
        || localStorage.getItem('cc_role') === 'landlord';
  }

  function markAuth() {
    sessionStorage.setItem(SESS_KEY, '1');
    localStorage.setItem('cc_role', 'landlord');
  }

  function clearError() {
    loginError.classList.remove('visible');
    loginPass.classList.remove('error');
  }

  function attempt() {
    if (isAuthed() || loginPass.value === PASS) {
      clearError();
      markAuth();
      if (selectedTab) sessionStorage.setItem('cc_open_tab', selectedTab);
      window.location.href = selectedDest;
    } else {
      loginError.classList.add('visible');
      loginPass.classList.add('error');
      loginPass.value = '';
      loginPass.focus();
    }
  }

  enterBtn.addEventListener('click', attempt);
  loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  loginPass.addEventListener('input', clearError);

  setTimeout(() => loginPass.focus(), 100);
</script>

</body>
</html>
